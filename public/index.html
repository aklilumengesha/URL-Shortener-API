<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapLink - URL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --accent: #7c3aed;
      --accent2: #6d28d9;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --text: #f1f1f5;
      --text-muted: #8888a0;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Navbar */
    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .brand-icon { font-size: 1.5rem; }
    .brand-name { background: linear-gradient(135deg, #7c3aed, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-links { display: flex; gap: 0.5rem; }

    .nav-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .nav-btn:hover { color: var(--text); background: var(--surface2); }
    .nav-btn.active { color: var(--text); background: var(--accent); border-color: var(--accent); }

    /* Pages */
    #main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    .page { display: none; }
    .page.active { display: block; }

    /* Hero */
    .hero { text-align: center; padding: 3rem 0 2rem; }
    .hero-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 0.75rem; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem; }

    /* Shorten Card */
    .shorten-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 680px;
      margin: 0 auto;
    }

    .input-group { display: flex; flex-direction: column; gap: 0.75rem; }

    .input-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1.2rem;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input-group input::placeholder { color: var(--text-muted); }

    .input-group button, button#shortenBtn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-group button:hover { background: var(--accent2); }
    .input-group button:active { transform: scale(0.98); }

    /* Result & Error boxes */
    .result-box {
      margin-top: 1.25rem;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .result-box span { color: var(--success); font-weight: 500; word-break: break-all; }

    .result-box button {
      background: var(--success);
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .result-box button:hover { opacity: 0.85; }

    .error-box {
      margin-top: 1.25rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      border-radius: 10px;
      padding: 1rem 1.2rem;
      color: var(--error);
    }

    .hidden { display: none !important; }

    /* Page Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .page-header h2 { font-size: 1.6rem; font-weight: 700; }

    .page-header button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .page-header button:hover { color: var(--text); }

    /* URL Cards */
    .url-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.4rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s;
    }

    .url-card:hover { border-color: var(--accent); }

    .url-info { flex: 1; min-width: 0; }
    .url-short { color: var(--accent); font-weight: 600; font-size: 1rem; cursor: pointer; }
    .url-short:hover { text-decoration: underline; }
    .url-original { color: var(--text-muted); font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.2rem; }

    .url-meta { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .url-clicks { background: var(--surface2); border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.8rem; color: var(--text-muted); }
    .url-date { color: var(--text-muted); font-size: 0.8rem; }

    .btn-delete {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn-delete:hover { border-color: var(--error); color: var(--error); background: rgba(239,68,68,0.08); }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      text-align: center;
    }

    .stat-value { font-size: 2rem; font-weight: 800; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }

    /* Top URLs */
    .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.8rem; }

    .top-url-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .top-url-row:hover .top-url-code { color: var(--accent); }

    .top-url-rank { color: var(--text-muted); font-size: 0.85rem; width: 24px; text-align: center; }
    .top-url-code { font-weight: 600; min-width: 100px; }
    .top-url-original { color: var(--text-muted); font-size: 0.85rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-url-clicks { color: var(--accent); font-weight: 600; font-size: 0.9rem; }

    /* Analytics Detail */
    .analytics-detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.5rem;
    }

    .analytics-detail h3 { margin-bottom: 1rem; }

    .time-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }

    .time-stat {
      background: var(--surface2);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }

    .time-stat-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .time-stat-label { color: var(--text-muted); font-size: 0.75rem; margin-top: 0.2rem; }

    /* Bar Chart */
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-bottom: 0.5rem; }
    .bar { flex: 1; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 4px; transition: opacity 0.2s; }
    .bar:hover { opacity: 0.7; }
    .bar-labels { display: flex; gap: 4px; }
    .bar-label { flex: 1; text-align: center; font-size: 0.65rem; color: var(--text-muted); }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pagination button:hover, .pagination button.active { background: var(--accent); border-color: var(--accent); color: white; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1.4rem;
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideIn 0.3s ease;
    }

    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }

    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .loading-text { color: var(--text-muted); text-align: center; padding: 2rem; }
    .empty-text { color: var(--text-muted); text-align: center; padding: 3rem; }

    @media (max-width: 600px) {
      .hero-title { font-size: 1.8rem; }
      .stats-grid { grid-template-columns: 1fr; }
      .time-stats { grid-template-columns: 1fr; }
      .url-date { display: none; }
      #navbar { padding: 0 1rem; }
      .brand-name { display: none; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav id="navbar">
    <div class="nav-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">SnapLink</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showPage('home')">Home</button>
      <button class="nav-btn" onclick="showPage('urls')">My URLs</button>
      <button class="nav-btn" onclick="showPage('analytics')">Analytics</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="main">

    <!-- Page: Home -->
    <section id="page-home" class="page active">
      <div class="hero">
        <h1 class="hero-title">Shorten Your Links</h1>
        <p class="hero-subtitle">Fast, simple, and free URL shortener</p>

        <div class="shorten-card">
          <div class="input-group">
            <input type="url" id="urlInput" placeholder="Paste your long URL here..." />
            <input type="text" id="aliasInput" placeholder="Custom alias (optional)" />
            <button id="shortenBtn" onclick="shortenUrl()">Shorten</button>
          </div>
          <div id="result-box" class="result-box hidden">
            <span id="result-url"></span>
            <button onclick="copyUrl()">Copy</button>
          </div>
          <div id="error-box" class="error-box hidden">
            <span id="error-msg"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Page: My URLs -->
    <section id="page-urls" class="page">
      <div class="page-header">
        <h2>My URLs</h2>
        <button onclick="loadUrls()">↻ Refresh</button>
      </div>
      <div id="urls-container">
        <p class="loading-text">Loading...</p>
      </div>
      <div id="pagination" class="pagination"></div>
    </section>

    <!-- Page: Analytics -->
    <section id="page-analytics" class="page">
      <div class="page-header">
        <h2>Analytics</h2>
        <button onclick="loadAnalytics()">↻ Refresh</button>
      </div>
      <div id="stats-overview" class="stats-grid"></div>
      <div id="top-urls-container"></div>
      <div id="url-detail-analytics" class="hidden"></div>
    </section>

  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script>
    // ── Utilities ──────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`page-${name}`).classList.add('active');
      document.querySelector(`[onclick="showPage('${name}')"]`).classList.add('active');
      if (name === 'urls') loadUrls();
      if (name === 'analytics') loadAnalytics();
    }

    // ── Shorten URL ────────────────────────────────────────────
    async function shortenUrl() {
      const url = document.getElementById('urlInput').value.trim();
      const alias = document.getElementById('aliasInput').value.trim();
      const resultBox = document.getElementById('result-box');
      const errorBox = document.getElementById('error-box');
      const btn = document.getElementById('shortenBtn');

      resultBox.classList.add('hidden');
      errorBox.classList.add('hidden');

      if (!url) {
        errorBox.classList.remove('hidden');
        document.getElementById('error-msg').textContent = 'Please enter a URL.';
        return;
      }

      btn.textContent = 'Shortening...';
      btn.disabled = true;

      try {
        const body = { url };
        if (alias) body.customAlias = alias;

        const res = await fetch('/api/urls', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.classList.remove('hidden');
          document.getElementById('error-msg').textContent = data.error || data.message || 'Something went wrong.';
          return;
        }

        document.getElementById('result-url').textContent = data.shortUrl;
        resultBox.classList.remove('hidden');
        document.getElementById('urlInput').value = '';
        document.getElementById('aliasInput').value = '';
        showToast('URL shortened successfully!');
      } catch (err) {
        errorBox.classList.remove('hidden');
        document.getElementById('error-msg').textContent = 'Network error. Is the server running?';
      } finally {
        btn.textContent = 'Shorten';
        btn.disabled = false;
      }
    }

    function copyUrl() {
      const url = document.getElementById('result-url').textContent;
      navigator.clipboard.writeText(url).then(() => showToast('Copied to clipboard!'));
    }

    // Allow Enter key to trigger shorten
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shortenUrl();
    });

    // ── My URLs ────────────────────────────────────────────────
    let currentPage = 1;

    async function loadUrls(page = 1) {
      currentPage = page;
      const container = document.getElementById('urls-container');
      container.innerHTML = '<p class="loading-text">Loading...</p>';

      try {
        const res = await fetch(`/api/urls?page=${page}&limit=10`);
        const data = await res.json();

        if (!data.urls || data.urls.length === 0) {
          container.innerHTML = '<p class="empty-text">No URLs yet. Shorten one on the Home page!</p>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        container.innerHTML = data.urls.map(url => `
          <div class="url-card" id="card-${url.shortCode}">
            <div class="url-info">
              <div class="url-short" onclick="copyShortUrl('${url.shortCode}')">
                /r/${url.shortCode}
              </div>
              <div class="url-original" title="${url.originalUrl}">${url.originalUrl}</div>
            </div>
            <div class="url-meta">
              <span class="url-clicks">👆 ${url.clicks} clicks</span>
              <span class="url-date">${formatDate(url.createdAt)}</span>
              <button class="btn-delete" onclick="deleteUrl('${url.shortCode}')">Delete</button>
            </div>
          </div>
        `).join('');

        renderPagination(data.pagination);
      } catch (err) {
        container.innerHTML = '<p class="empty-text">Failed to load URLs.</p>';
      }
    }

    async function deleteUrl(code) {
      if (!confirm(`Delete /${code}?`)) return;

      try {
        const res = await fetch(`/api/urls/${code}`, { method: 'DELETE' });
        if (res.ok) {
          document.getElementById(`card-${code}`)?.remove();
          showToast('URL deleted.');
          // Reload if page is now empty
          const remaining = document.querySelectorAll('.url-card').length;
          if (remaining === 0) loadUrls(currentPage > 1 ? currentPage - 1 : 1);
        } else {
          showToast('Failed to delete.', 'error');
        }
      } catch {
        showToast('Network error.', 'error');
      }
    }

    function copyShortUrl(code) {
      const url = `${window.location.origin}/r/${code}`;
      navigator.clipboard.writeText(url).then(() => showToast('Copied!'));
    }

    function renderPagination(pagination) {
      const el = document.getElementById('pagination');
      if (pagination.pages <= 1) { el.innerHTML = ''; return; }

      let html = `<button ${pagination.page <= 1 ? 'disabled' : ''} onclick="loadUrls(${pagination.page - 1})">← Prev</button>`;
      for (let i = 1; i <= pagination.pages; i++) {
        html += `<button class="${i === pagination.page ? 'active' : ''}" onclick="loadUrls(${i})">${i}</button>`;
      }
      html += `<button ${pagination.page >= pagination.pages ? 'disabled' : ''} onclick="loadUrls(${pagination.page + 1})">Next →</button>`;
      el.innerHTML = html;
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Analytics ──────────────────────────────────────────────
    async function loadAnalytics() {
      document.getElementById('stats-overview').innerHTML = '<p class="loading-text">Loading...</p>';
      document.getElementById('top-urls-container').innerHTML = '';
      document.getElementById('url-detail-analytics').classList.add('hidden');

      try {
        const res = await fetch('/api/analytics');
        const data = await res.json();

        // Stats overview cards
        document.getElementById('stats-overview').innerHTML = `
          <div class="stat-card">
            <div class="stat-value">${data.totalUrls}</div>
            <div class="stat-label">Total URLs</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.totalClicks}</div>
            <div class="stat-label">Total Clicks</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${data.avgClicksPerUrl}</div>
            <div class="stat-label">Avg Clicks / URL</div>
          </div>
        `;

        // Top URLs list
        if (!data.topUrls || data.topUrls.length === 0) {
          document.getElementById('top-urls-container').innerHTML = '<p class="empty-text">No URLs yet.</p>';
          return;
        }

        document.getElementById('top-urls-container').innerHTML = `
          <p class="section-title">Top URLs by Clicks</p>
          ${data.topUrls.map((url, i) => `
            <div class="top-url-row" onclick="loadUrlAnalytics('${url.shortCode}')">
              <span class="top-url-rank">#${i + 1}</span>
              <span class="top-url-code">/r/${url.shortCode}</span>
              <span class="top-url-original">${url.originalUrl}</span>
              <span class="top-url-clicks">${url.clicks} clicks</span>
            </div>
          `).join('')}
          <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.75rem">Click a URL to see detailed analytics</p>
        `;
      } catch (err) {
        document.getElementById('stats-overview').innerHTML = '<p class="empty-text">Failed to load analytics.</p>';
      }
    }

    async function loadUrlAnalytics(code) {
      const detail = document.getElementById('url-detail-analytics');
      detail.classList.remove('hidden');
      detail.innerHTML = '<p class="loading-text">Loading details...</p>';

      try {
        const res = await fetch(`/api/analytics/${code}`);
        const data = await res.json();

        // Build bar chart for clicks by date
        const maxClicks = Math.max(...(data.clicksByDate.map(d => d.count)), 1);
        const bars = data.clicksByDate.length > 0
          ? `
            <p class="section-title" style="margin-top:1.5rem">Clicks Last 7 Days</p>
            <div class="bar-chart">
              ${data.clicksByDate.map(d => `
                <div class="bar" style="height:${Math.max((d.count / maxClicks) * 100, 5)}%" title="${d.date}: ${d.count} clicks"></div>
              `).join('')}
            </div>
            <div class="bar-labels">
              ${data.clicksByDate.map(d => `<span class="bar-label">${d.date.slice(5)}</span>`).join('')}
            </div>
          `
          : '<p style="color:var(--text-muted);font-size:0.85rem;margin-top:1rem">No click data yet.</p>';

        detail.innerHTML = `
          <div class="analytics-detail">
            <h3>📊 /r/${data.shortCode}</h3>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem;word-break:break-all">${data.originalUrl}</p>
            <div class="time-stats">
              <div class="time-stat">
                <div class="time-stat-value">${data.statistics.last24h}</div>
                <div class="time-stat-label">Last 24h</div>
              </div>
              <div class="time-stat">
                <div class="time-stat-value">${data.statistics.last7d}</div>
                <div class="time-stat-label">Last 7 days</div>
              </div>
              <div class="time-stat">
                <div class="time-stat-value">${data.statistics.last30d}</div>
                <div class="time-stat-label">Last 30 days</div>
              </div>
            </div>
            ${bars}
          </div>
        `;
      } catch (err) {
        detail.innerHTML = '<p class="empty-text">Failed to load URL analytics.</p>';
      }
    }

    // ── Init ───────────────────────────────────────────────────
    // Auto-focus URL input on load
    window.addEventListener('load', () => {
      document.getElementById('urlInput').focus();
    });

    // Paste from clipboard button support
    document.getElementById('urlInput').addEventListener('paste', () => {
      setTimeout(() => {
        const val = document.getElementById('urlInput').value.trim();
        if (val && !val.startsWith('http')) {
          document.getElementById('urlInput').value = 'https://' + val;
        }
      }, 10);
    });

    // Auto-prefix https:// if missing on blur
    document.getElementById('urlInput').addEventListener('blur', () => {
      const val = document.getElementById('urlInput').value.trim();
      if (val && !val.startsWith('http://') && !val.startsWith('https://')) {
        document.getElementById('urlInput').value = 'https://' + val;
      }
    });

    // Alias input: strip spaces and special chars live
    document.getElementById('aliasInput').addEventListener('input', () => {
      const el = document.getElementById('aliasInput');
      el.value = el.value.replace(/[^a-zA-Z0-9_-]/g, '');
    });

    // Hide toast on click
    document.getElementById('toast').addEventListener('click', () => {
      document.getElementById('toast').classList.add('hidden');
    });

    // Show result short URL as clickable link
    document.getElementById('result-url').addEventListener('click', () => {
      const url = document.getElementById('result-url').textContent;
      window.open(url, '_blank');
    });

    // Add pointer cursor to result URL
    document.getElementById('result-url').style.cursor = 'pointer';
    document.getElementById('result-url').title = 'Click to open';

  </script>
</body>
</html>
